name: PR Checks

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      wall_only: ${{ steps.scope.outputs.wall_only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect change scope
        id: scope
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          else
            files=""
          fi

          wall_only=true
          has_files=false
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            has_files=true
            if [ "$path" != "docs/wall-of-apps.json" ]; then
              wall_only=false
            fi
          done <<< "$files"

          if [ "$has_files" = false ]; then
            wall_only=false
          fi

          echo "wall_only=$wall_only" >> "$GITHUB_OUTPUT"

  wall-only-check:
    needs: changes
    if: needs.changes.outputs.wall_only == 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Check Wall of Apps source
        run: make check-wall-of-apps

  format-and-lint:
    needs: changes
    if: needs.changes.outputs.wall_only != 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Cache Go tools
        id: go-tools-cache
        uses: actions/cache@v5
        with:
          path: ~/go/bin
          key: ${{ runner.os }}-go-tools-${{ hashFiles('Makefile') }}

      - name: Install tooling
        if: steps.go-tools-cache.outputs.cache-hit != 'true'
        run: make tools

      - name: Check formatting
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make format-check

      - name: Check Wall of Apps source
        run: make check-wall-of-apps

      - name: Self-test docs validators
        run: python3 scripts/test_check_docs.py

      - name: Check documentation
        run: make check-docs

      - name: Run lint
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          make lint

  unit-tests:
    needs: changes
    if: needs.changes.outputs.wall_only != 'true'
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Download stats badge script self-test
        run: python3 scripts/test_download_stats_total.py

      - name: Run unit tests
        run: ASC_BYPASS_KEYCHAIN=1 go test -short ./...

  build:
    needs: changes
    if: needs.changes.outputs.wall_only != 'true'
    runs-on: macos-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - name: Build for macOS
        run: |
          mkdir -p build
          GOOS=darwin GOARCH=amd64 go build -o build/asc_dev_macOS_amd64 .
          GOOS=darwin GOARCH=arm64 go build -o build/asc_dev_macOS_arm64 .

      - name: Build for Linux
        run: |
          GOOS=linux GOARCH=amd64 go build -o build/asc_dev_linux_amd64 .
          GOOS=linux GOARCH=arm64 go build -o build/asc_dev_linux_arm64 .

      - name: Build for Windows
        run: |
          GOOS=windows GOARCH=amd64 go build -o build/asc_dev_windows_amd64.exe .

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: builds
          path: build/
